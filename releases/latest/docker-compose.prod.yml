# docker-compose.prod.yml — Chyro production full-stack compose (STORY-021-07)
#
# PURPOSE: Self-hosted production deployment bundling:
#   - Chyro application services (backend API, background worker, frontend SPA)
#   - Full self-hosted Supabase stack (postgres, auth, rest, realtime, storage,
#     meta, studio, kong, imgproxy)
#   - Redis (ARQ job queue + cache)
#   - Caddy (reverse proxy + automatic TLS via Let's Encrypt)
#   - Langfuse v3 LLM observability (optional — use --profile langfuse)
#
# USAGE:
#   # Start core stack (no Langfuse):
#   docker compose -f docker-compose.prod.yml up -d
#
#   # Start with Langfuse observability:
#   docker compose -f docker-compose.prod.yml --profile langfuse up -d
#
# PREREQUISITES:
#   1. Copy .env.example to .env and fill in all required values.
#   2. Create branding/ directory: mkdir -p branding/
#      (Docker must NOT create this — root-owned dirs break Caddy static serving)
#   3. Point DOMAIN's DNS A records to this server's IP.
#   4. Ensure ports 80 and 443 are open in firewall.
#
# Supabase image pins: 20240131 series (ADR-006; pgvector >=0.8.2 required)
# These must match docker-compose.yml to prevent schema drift.
#
# Port exposure (host → container):
#   80, 443 → Caddy (TLS termination; all app traffic enters here)
#   No other ports are exposed to the host in production.

name: chyro-prod

x-supabase-env: &supabase-env
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  ANON_KEY: ${ANON_KEY}
  SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}

services:

  # ============================================================
  # DATABASE — PostgreSQL 15 with pgvector (ADR-006)
  # Pinned to the same image tag as docker-compose.yml.
  # pgvector >=0.8.2 is bundled in this image.
  # ============================================================
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    # No host port exposure in production — only internal Docker network access.
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount Chyro init SQL as 99-* so it runs AFTER Supabase's built-in init
      # scripts (which create auth roles, schemas, extensions).
      - ./volumes/db/init/init.sql:/docker-entrypoint-initdb.d/99-chyro-init.sql:ro
      # Set passwords for Supabase service roles (auth_admin, authenticator, storage_admin)
      # These roles are created without passwords by the built-in init scripts.
      - ./volumes/db/init/zz-set-role-passwords.sh:/docker-entrypoint-initdb.d/zz-set-role-passwords.sh:ro
      # Mount migrations dir so psql can run them from inside the container
      - ./database/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # AUTH — GoTrue (Supabase auth server, ADR-008)
  # Handles JWT issuance and OAuth flows. Not exposed directly —
  # all auth traffic is routed through Kong.
  # ============================================================
  auth:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-https://${DOMAIN}}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-https://${DOMAIN}}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Chyro}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_SIGNUP:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://${DOMAIN}/auth/v1/callback}

  # ============================================================
  # REST — PostgREST (auto-generated REST API from Postgres schema)
  # Hard dependency for Supabase Storage and Studio (FLASHCARD).
  # Must always be included — Storage silently fails without it.
  # ============================================================
  rest:
    image: postgrest/postgrest:v14.6
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}

  # ============================================================
  # REALTIME — Supabase Realtime websocket server (ADR-009)
  # ============================================================
  realtime:
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${DB_ENC_KEY:-supabaserealtimesecret}
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa32Sq2Zp}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"

  # ============================================================
  # STORAGE — Supabase Storage API
  # Requires PostgREST (rest service) to be running.
  # ============================================================
  storage:
    image: supabase/storage-api:v1.44.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage

  # ============================================================
  # IMGPROXY — Image transformation service for Storage
  # ============================================================
  imgproxy:
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"

  # ============================================================
  # META — Supabase Postgres Meta (schema browser used by Studio)
  # ============================================================
  meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ============================================================
  # STUDIO — Supabase Studio web UI
  # Accessible at db.{DOMAIN} via Caddy — not exposed directly.
  # ============================================================
  studio:
    image: supabase/studio:2026.03.16-sha-5528817
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Chyro}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-chyro-prod}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: https://${DOMAIN}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-super-secret-and-long-logflare-key}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

  # ============================================================
  # KONG — Supabase API gateway
  # Routes /auth, /rest, /realtime, /storage to their services.
  # In production, Kong is reached via Caddy proxy at /supabase/*
  # or directly at the internal Docker network address.
  # ============================================================
  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro

  # ============================================================
  # REDIS — Cache and ARQ job queue (ADR-007)
  # Not exposed to the host in production — internal network only.
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - redis_data:/data

  # ============================================================
  # BACKEND — Chyro FastAPI application server
  # Image pulled from registry.chyro.net (STORY-024-02).
  # SUPABASE_URL points to Kong on the internal Docker network.
  # Pin to a specific release by setting CHYRO_VERSION in .env.
  # ============================================================
  backend:
    image: registry.chyro.net/chyro-backend:${CHYRO_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: https://${DOMAIN}
      ENVIRONMENT: production
      # Langfuse — uses container-internal address when enabled
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

  # ============================================================
  # WORKER — Chyro ARQ background worker (document processing)
  # Shares the backend image but runs arq instead of uvicorn.
  # Same image as backend — CHYRO_VERSION controls both together.
  # ============================================================
  worker:
    image: registry.chyro.net/chyro-backend:${CHYRO_VERSION:-latest}
    restart: unless-stopped
    command: ["arq", "app.workers.tasks.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}

  # ============================================================
  # FRONTEND — Chyro SPA served via nginx
  # Image pulled from registry.chyro.net (STORY-024-02).
  # Pin to a specific release by setting CHYRO_VERSION in .env.
  #
  # RUNTIME CONFIG INJECTION (R7):
  #   /app/public/config.js is volume-mounted into the nginx html
  #   directory as /usr/share/nginx/html/config.js. This file sets
  #   window.CHYRO_CONFIG = { supabaseUrl, supabaseAnonKey } at
  #   runtime, eliminating the need for VITE_SUPABASE_* build args.
  #   The operator writes config.js values before starting the stack.
  #   See frontend/public/config.js for the template format.
  #
  # BRANDING VOLUME:
  #   The branding/ directory is mounted read-only into Caddy (not here).
  #   See the caddy service below.
  # ============================================================
  frontend:
    image: registry.chyro.net/chyro-frontend:${CHYRO_VERSION:-latest}
    restart: unless-stopped
    volumes:
      # R7: Runtime config injection — operator writes this file before starting.
      # The file sets window.CHYRO_CONFIG with supabaseUrl and supabaseAnonKey.
      # nginx serves it at /config.js, which index.html loads before the app bundle.
      - ./frontend/public/config.js:/usr/share/nginx/html/config.js:ro
      # STORY-024-03: Override the baked-in nginx.conf with the production-specific
      # config that omits the /api/ proxy block. In production Caddy routes /api/*
      # to the backend before it reaches nginx, so the proxy block is not needed
      # and would crash nginx if the backend service name were "api" (it is "backend").
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ============================================================
  # CADDY — Reverse proxy with automatic TLS (R2)
  #
  # Routes:
  #   https://{DOMAIN}/api/*    → backend:8000
  #   https://{DOMAIN}/branding/* → static files from /srv/branding/
  #   https://db.{DOMAIN}       → studio:3000 (Supabase Studio)
  #   https://traces.{DOMAIN}   → langfuse:3000 (when --profile langfuse)
  #   https://{DOMAIN}/*        → frontend:80 (catch-all)
  #
  # BRANDING VOLUME (R4):
  #   Mount ./branding/ as /srv/branding/ read-only. The operator MUST
  #   create this directory before first start:
  #     mkdir -p branding/
  #   Docker must NOT create it — a Docker-created directory is root-owned
  #   and Caddy's file_server cannot serve from it correctly.
  #
  # TLS: Caddy uses Let's Encrypt ACME (HTTP-01 challenge) automatically.
  #   Ports 80 and 443 must be reachable from the public internet.
  #   TLS certs are persisted in caddy_data volume.
  # ============================================================
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    depends_on:
      - frontend
      - backend
      - studio
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # R4: branding/ MUST be pre-created by the operator (mkdir -p branding/).
      # Never let Docker auto-create this directory — it will be root-owned.
      - ./branding/:/srv/branding/:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}

  # ============================================================
  # LANGFUSE — LLM observability (optional, --profile langfuse)
  #
  # Start with: docker compose --profile langfuse up -d
  #
  # Langfuse shares the Supabase PostgreSQL instance using a
  # dedicated 'langfuse' schema within the same postgres container.
  # This eliminates the need for a separate langfuse-db container.
  #
  # Accessible at https://traces.{DOMAIN} via Caddy.
  #
  # First-time setup: open traces.{DOMAIN}, create an account,
  # create a project, copy the API keys to .env as
  # LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY.
  # ============================================================

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    profiles: ["langfuse"]
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O/dev/null http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    restart: unless-stopped
    profiles: ["langfuse"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio-createbuckets:
    image: minio/mc
    restart: on-failure
    profiles: ["langfuse"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-miniosecret} &&
      mc mb --ignore-existing local/langfuse &&
      echo 'langfuse bucket ready'
      "

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["langfuse"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    profiles: ["langfuse"]
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    environment: &langfuse-env
      # Langfuse uses the shared Supabase postgres with a dedicated 'langfuse' schema.
      # The langfuse schema must be created before first start:
      #   docker exec -it <db-container> psql -U postgres -c "CREATE SCHEMA IF NOT EXISTS langfuse;"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?schema=langfuse
      NEXTAUTH_URL: https://traces.${DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/

  langfuse:
    image: langfuse/langfuse:3
    restart: unless-stopped
    profiles: ["langfuse"]
    depends_on:
      - langfuse-worker
    environment:
      <<: *langfuse-env

volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local
  langfuse_minio_data:
    driver: local
